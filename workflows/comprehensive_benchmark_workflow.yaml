schema_version: "2.0"
name: "GRDL Comprehensive Benchmark"
version: "2.0.0"
description: >-
  Full GRDL processing pipeline: IO → filtering → intensity →
  decomposition → SAR processing → detection → orthorectification.
  Exercises every available image processing component in GRDL.

state: "draft"

tags:
  modalities: [SAR]
  niirs_range: [3.0, 6.0]
  day_capable: true
  night_capable: true
  detection_types: []
  segmentation_types: []

steps:
  # ── Stage 1: Complex-domain speckle filter ─────────────────────────────
  - processor: grdl.image_processing.filters.ComplexLeeFilter
    version: "2.0.0"
    id: despeckle
    phase: global_processing
    params:
      kernel_size: 7

  # ── Stage 2a: Phase gradient analysis (fan-out from despeckled) ────────
  - processor: grdl.image_processing.filters.PhaseGradientFilter
    version: "1.0.0"
    id: grad_row
    depends_on: [despeckle]
    phase: global_processing
    params:
      kernel_size: 5
      direction: row

  - processor: grdl.image_processing.filters.PhaseGradientFilter
    version: "1.0.0"
    id: grad_col
    depends_on: [despeckle]
    phase: global_processing
    params:
      kernel_size: 5
      direction: col

  - processor: grdl.image_processing.filters.PhaseGradientFilter
    version: "1.0.0"
    id: grad_mag
    depends_on: [despeckle]
    phase: global_processing
    params:
      kernel_size: 5
      direction: magnitude

  # ── Stage 2b: Amplitude conversion ─────────────────────────────────────
  - processor: grdl.image_processing.intensity.ToDecibels
    version: "1.0.0"
    id: to_db
    depends_on: [despeckle]
    phase: global_processing
    params:
      floor_db: -60.0

  # ── Stage 3: Real-valued speckle filter on dB output ───────────────────
  - processor: grdl.image_processing.filters.LeeFilter
    version: "1.0.0"
    id: lee_real
    depends_on: [to_db]
    phase: global_processing
    params:
      kernel_size: 7

  # ── Stage 3: Linear filters on dB output ───────────────────────────────
  - processor: grdl.image_processing.filters.MeanFilter
    version: "1.0.0"
    id: mean_filter
    depends_on: [to_db]
    phase: global_processing
    params:
      kernel_size: 5

  - processor: grdl.image_processing.filters.GaussianFilter
    version: "1.0.0"
    id: gaussian_filter
    depends_on: [to_db]
    phase: global_processing
    params:
      sigma: 1.5
      truncate: 4.0

  # ── Stage 3: Rank filters on dB output ─────────────────────────────────
  - processor: grdl.image_processing.filters.MedianFilter
    version: "1.0.0"
    id: median_filter
    depends_on: [to_db]
    phase: global_processing
    params:
      kernel_size: 5

  - processor: grdl.image_processing.filters.MinFilter
    version: "1.0.0"
    id: min_filter
    depends_on: [to_db]
    phase: global_processing
    params:
      kernel_size: 3

  - processor: grdl.image_processing.filters.MaxFilter
    version: "1.0.0"
    id: max_filter
    depends_on: [to_db]
    phase: global_processing
    params:
      kernel_size: 3

  # ── Stage 3: Statistical texture on dB output ──────────────────────────
  - processor: grdl.image_processing.filters.StdDevFilter
    version: "1.0.0"
    id: texture
    depends_on: [to_db]
    phase: global_processing
    params:
      kernel_size: 5

  # ── Stage 3b: Polarimetric decomposition (requires dual-pol data) ─────
  - processor: grdl.image_processing.decomposition.DualPolHAlpha
    version: "1.0.0"
    id: dual_pol_halpha
    depends_on: [despeckle]
    condition: "input_format == 'dual_pol'"
    phase: global_processing
    params: {}

  # ── Stage 3c: SAR sub-aperture processing (requires SICD metadata) ───
  - processor: grdl.image_processing.sar.MultilookDecomposition
    version: "1.0.0"
    id: multilook_2x2
    depends_on: [despeckle]
    condition: "input_format == 'SICD_with_metadata'"
    phase: global_processing
    params:
      looks_rg: 2
      looks_az: 2

  - processor: grdl.image_processing.sar.CSIProcessor
    version: "0.2.0"
    id: csi_rgb
    depends_on: [despeckle]
    condition: "input_format == 'SICD_with_metadata'"
    phase: global_processing
    params:
      overlap: 0.1
      deweight: true
      normalize: true

  # ── Stage 4: CFAR detection on dB branch ──────────────────────────────
  - processor: grdl.image_processing.detection.cfar.CACFARDetector
    version: "1.0.0"
    id: cfar_ca
    depends_on: [to_db]
    phase: global_processing
    params:
      guard_cells: 3
      training_cells: 12
      pfa: 0.001

  - processor: grdl.image_processing.detection.cfar.GOCFARDetector
    version: "1.0.0"
    id: cfar_go
    depends_on: [to_db]
    phase: global_processing
    params:
      guard_cells: 3
      training_cells: 12
      pfa: 0.001

  - processor: grdl.image_processing.detection.cfar.SOCFARDetector
    version: "1.0.0"
    id: cfar_so
    depends_on: [to_db]
    phase: global_processing
    params:
      guard_cells: 3
      training_cells: 12
      pfa: 0.001

  - processor: grdl.image_processing.detection.cfar.OSCFARDetector
    version: "1.0.0"
    id: cfar_os
    depends_on: [to_db]
    phase: global_processing
    params:
      guard_cells: 3
      training_cells: 12
      pfa: 0.001

  # ── Stage 5: Contrast stretch (finalization) ───────────────────────────
  - processor: grdl.image_processing.intensity.PercentileStretch
    version: "1.0.0"
    id: percentile_stretch
    depends_on: [to_db]
    phase: finalization
    params:
      plow: 2.0
      phigh: 98.0

  # ── Stage 6: Ortho pipeline (requires reader + geolocation context) ───
  - processor: grdl.image_processing.ortho.OrthoPipeline
    version: "1.0.0"
    id: ortho_pipeline
    depends_on: [percentile_stretch]
    condition: "input_format == 'SICD_with_metadata'"
    phase: finalization
    params:
      interpolation: bilinear

  # ── Image Formation branch (CPHD input, conditional) ─────────────────
  - processor: grdl.image_processing.sar.image_formation.CollectionGeometry
    version: "1.0.0"
    id: collection_geometry
    condition: "input_format == 'CPHD'"
    phase: global_processing
    params: {}

  - processor: grdl.image_processing.sar.image_formation.PolarGrid
    version: "1.0.0"
    id: polar_grid
    depends_on: [collection_geometry]
    condition: "input_format == 'CPHD'"
    phase: global_processing
    params: {}

  - processor: grdl.image_processing.sar.image_formation.PolarFormatAlgorithm
    version: "1.0.0"
    id: pfa_form
    depends_on: [polar_grid]
    condition: "input_format == 'CPHD'"
    phase: global_processing
    params: {}

  - processor: grdl.image_processing.sar.image_formation.RangeDopplerAlgorithm
    version: "1.0.0"
    id: rda_form
    depends_on: [collection_geometry]
    condition: "input_format == 'CPHD'"
    phase: global_processing
    params: {}

  - processor: grdl.image_processing.sar.image_formation.StripmapPFA
    version: "1.0.0"
    id: stripmap_pfa
    depends_on: [polar_grid]
    condition: "input_format == 'CPHD'"
    phase: global_processing
    params:
      n_subapertures: 4

  - processor: grdl.image_processing.sar.image_formation.FastBackProjection
    version: "1.0.0"
    id: ffbp
    depends_on: [collection_geometry]
    condition: "input_format == 'CPHD'"
    phase: global_processing
    params:
      n_subapertures: 4

  - processor: grdl.image_processing.sar.image_formation.SubaperturePartitioner
    version: "1.0.0"
    id: subaperture_partition
    depends_on: [collection_geometry]
    condition: "input_format == 'CPHD'"
    phase: global_processing
    params:
      n_subapertures: 4
