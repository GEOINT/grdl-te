[pytest]
markers =
    slow: mark test as slow
    integration: mark test as an integration test
    requires_data: mark test as requiring external data
    geolocation: geolocation tests
    ortho: orthorectification tests
    sar: SAR specific tests
    image_formation: image formation tests
    discovery: discovery plugin tests
    writers: IO writer tests
    viirs: VIIRS tests
    terrasar: TerraSAR-X tests
    sidd: SIDD tests
    sicd: SICD tests
    sentinel2: Sentinel-2 tests
    sentinel1: Sentinel-1 tests
    nitf: NITF tests
    hdf5: HDF5 tests
    geotiff: GeoTIFF tests
    eo_nitf: EO NITF tests
    crsd: CRSD tests
    cphd: CPHD tests
    biomass: BIOMASS tests
    aster: ASTER tests
    interpolation: interpolation tests
    intensity: intensity tests
    gpu: GPU tests
    filters: filter tests
    enu_grid: ENU grid tests
    elevation: elevation tests
    detection: detection tests
    decomposition: decomposition tests
    coregistration: coregistration tests
    coordinate_utils: coordinate utility tests
    data_prep: data preparation tests
    accelerated_resampling: accelerated resampling tests
    topology: topology tests
    report_engine: report engine tests
    report_md: report markdown tests
    comparison: comparison tests
    component: component benchmark tests
    active_runner: active runner tests
    passive_runner: passive runner tests
    benchmark_models: benchmark model tests
    benchmark_report: benchmark report tests
    benchmark_source: benchmark source tests
    benchmark_store: benchmark store tests
    infrastructure: infrastructure tests
    pipeline: pipeline tests
    transforms: transform tests
    cfar: CFAR detection tests
    landsat: Landsat IO tests
    nisar: NISAR IO tests

filterwarnings =
    ignore:Conversion of an array with ndim > 0 to a scalar is deprecated:DeprecationWarning
    ignore:Dataset has no geotransform, gcps, or rpcs:
    ignore:.*urllib3.*match a supported version.*:
